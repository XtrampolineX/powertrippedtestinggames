<!DOCTYPE html>
<html>
<head>
  <title>A Chill Roadtrip Game</title>
</head>
<body>
<canvas id="gameCanvas" width="480" height="360" style="border:3px solid #000000;"></canvas>

<script>
var canvas = document.getElementById("gameCanvas");
var playerctx = canvas.getContext("2d");
const roadctx = canvas.getContext("2d");

var playerX = 240;
var playerY = 180;

document.addEventListener("keydown", function(e) {
  const key = e.key.toLowerCase();
  if (key === "w") playerY -= 5;
  if (key === "s") playerY += 5;
  if (key === "a") playerX -= 5;
  if (key === "d") playerX += 5;
  draw();
})

function draw() {
playerctx.clearRect(0, 0, canvas.width, canvas.height);
roadctx.clearRect(0, 0, canvas.width, canvas.height);

roadctx.fillStyle = "grey";
roadctx.fillRect(195, 0, 100, 480);

playerctx.beginPath();
playerctx.arc(playerX, playerY, 20, 0, 2 * Math.PI);
playerctx.stroke();
}
draw();
</script>
</body>
</html>
